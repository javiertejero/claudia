services:
  app:
    build: .
    container_name: reservas_app
    restart: always
    volumes:
      # Mapeamos una carpeta local 'data' al contenedor para que la base de datos sea persistente
      - ./data:/app/data

  caddy:
    image: caddy:latest
    container_name: reservas_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      # Guardamos los certificados SSL para no agotar el límite de Let's Encrypt al reiniciar
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config: