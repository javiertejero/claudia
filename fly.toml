# fly.toml app configuration file generated for claudia on 2026-05-31T21:16:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claudia'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

# --- Add this section ---
[mounts]
  source = 'claudia_data'
  destination = '/app/data'